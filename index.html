<!DOCTYPE html>
<html>
<head>
  <title>Download File</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:100px;">

  <h2>Download your file</h2>

  <button onclick="downloadFile()" style="padding:15px 25px; font-size:16px; cursor:pointer;">
    Download File
  </button>

  <script>
    function downloadFile() {
      const link = document.createElement("a");
      link.href = "file.zip";  // change this to your file name
      link.download = "file.zip"; // name when downloaded
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>

</body>
</html>
